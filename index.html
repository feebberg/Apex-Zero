<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APEX ZERO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    :root {
        --glass-bg: rgba(255,255,255,0.08);
        --glass-bg-strong: rgba(255,255,255,0.12);
        --glass-border: rgba(255,255,255,0.25);
        --glass-border-strong: rgba(255,255,255,0.45);
        --divider: rgba(255,255,255,0.18);
    }

    * { box-sizing: border-box; }

    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    /* --- LOADING SCREEN --- */
    #loadingScreen {
        position: fixed;
        inset: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 999;
        animation: fadeOut 1s ease forwards;
        animation-delay: 1.8s;
    }
    #loadingTitle {
        font-size: 26px;
        letter-spacing: 6px;
        margin-bottom: 20px;
    }
    #loadingBar {
        width: 180px;
        height: 4px;
        background: rgba(255,255,255,0.15);
        border-radius: 10px;
        overflow: hidden;
    }
    #loadingFill {
        width: 0%;
        height: 100%;
        background: rgba(255,255,255,0.8);
        animation: loadAnim 1.6s ease forwards;
    }
    @keyframes loadAnim { to { width: 100%; } }
    @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

    /* --- TOP BAR (REORGANIZED) --- */
    #topBar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: center; /* Center the Title */
        font-size: 18px;
        font-weight: bold;
        letter-spacing: 4px;
        backdrop-filter: blur(8px);
        background: rgba(255,255,255,0.04);
        border-bottom: 1px solid rgba(255,255,255,0.12);
        z-index: 20;
    }
    #topBarLeft {
        position: absolute;
        left: 16px;
        font-size: 10px;
        letter-spacing: 2px;
        opacity: 0.5;
    }
    #topBarRight {
        position: absolute;
        right: 16px;
        display: flex;
        gap: 12px;
        align-items: center;
    }
    #settingsBtn, #notifBtn {
        padding: 6px 12px;
        border-radius: 999px;
        border: 1px solid var(--glass-border);
        background: var(--glass-bg);
        backdrop-filter: blur(6px);
        cursor: pointer;
        font-size: 10px;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #fff;
        transition: 0.2s;
    }
    #settingsBtn:hover, #notifBtn:hover {
        background: var(--glass-bg-strong);
        border-color: var(--glass-border-strong);
    }
    #profileName {
        font-size: 12px;
        opacity: 0.8;
        border-right: 1px solid var(--divider);
        padding-right: 12px;
        margin-right: 4px;
    }

    /* --- LAYOUT SHELL --- */
    #shell {
        position: absolute;
        top: 52px;
        bottom: 40px;
        left: 0;
        right: 0;
        display: flex;
    }

    /* --- SIDEBAR (GROUPED) --- */
    #sidebar {
        width: 210px;
        border-right: 1px solid rgba(255,255,255,0.12);
        background: rgba(255,255,255,0.03);
        backdrop-filter: blur(10px);
        padding: 20px 14px;
        display: flex;
        flex-direction: column;
        z-index: 5;
    }
    .sidebarGroup {
        margin-bottom: 30px;
    }
    .sideSectionLabel {
        font-size: 10px;
        letter-spacing: 2px;
        opacity: 0.4;
        margin-bottom: 10px;
        padding-left: 10px;
    }
    .sideLink {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid transparent;
        cursor: pointer;
        font-size: 13px;
        opacity: 0.8;
        display: flex;
        align-items: center;
        justify-content: space-between;
        transition: 0.2s;
        margin-bottom: 2px;
    }
    .sideLink span {
        font-size: 9px;
        opacity: 0.5;
        background: rgba(255,255,255,0.1);
        padding: 2px 6px;
        border-radius: 4px;
    }
    .sideLink.active, .sideLink:hover {
        border-color: var(--glass-border);
        background: var(--glass-bg);
        opacity: 1;
    }

    /* --- MAIN AREA --- */
    #mainArea {
        flex: 1;
        padding: 25px;
        overflow: auto;
        position: relative;
    }
    #sectionHeaderRow {
        display: flex;
        justify-content: space-between;
        align-items: center;
        max-width: 1100px;
        margin: 0 auto 15px auto;
    }
    #sectionLabel {
        font-size: 12px;
        letter-spacing: 2px;
        opacity: 0.6;
    }
    #searchBox {
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid var(--glass-border);
        background: rgba(255,255,255,0.04);
        color: #fff;
        font-size: 12px;
        min-width: 220px;
        outline: none;
        backdrop-filter: blur(6px);
        transition: 0.3s;
    }
    #searchBox:focus {
        border-color: var(--glass-border-strong);
        background: rgba(255,255,255,0.08);
    }

    /* --- GAME GRID --- */
    #grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        padding-bottom: 40px;
        max-width: 1100px;
        margin: auto;
    }
    .icon {
        padding: 24px;
        cursor: pointer;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.15);
        background: var(--glass-bg);
        backdrop-filter: blur(10px);
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .iconTitle {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 6px;
    }
    .iconDesc {
        font-size: 11px;
        opacity: 0.6;
        line-height: 1.4;
    }
    .icon:hover {
        background: var(--glass-bg-strong);
        border-color: var(--glass-border-strong);
        transform: translateY(-5px);
    }

    /* --- RECENT PANEL --- */
    #recentPanel {
        max-width: 1100px;
        margin: 20px auto 60px auto;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.15);
        background: rgba(255,255,255,0.03);
        padding: 20px;
    }
    #recentHeaderRow {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
    }
    #recentTitle { font-size: 11px; letter-spacing: 2px; opacity: 0.5; }
    #clearRecentBtn {
        font-size: 10px;
        border-radius: 999px;
        border: 1px solid var(--glass-border);
        background: transparent;
        color: #fff;
        padding: 4px 12px;
        cursor: pointer;
    }

    /* --- DOCK (POLISHED) --- */
    #dock {
        position: fixed;
        bottom: 55px;
        left: 50%;
        transform: translateX(-50%);
        padding: 6px;
        border-radius: 24px;
        border: 1px solid var(--glass-border);
        background: rgba(0,0,0,0.4);
        backdrop-filter: blur(15px);
        display: flex;
        gap: 6px;
        z-index: 30;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .dockItem {
        padding: 8px 14px;
        border-radius: 18px;
        font-size: 10px;
        letter-spacing: 1px;
        cursor: pointer;
        opacity: 0.7;
        transition: 0.2s;
    }
    .dockItem:hover {
        opacity: 1;
        background: rgba(255,255,255,0.1);
    }
    .dockItem.running {
        background: rgba(255,255,255,0.15);
        border: 1px solid rgba(255,255,255,0.2);
        opacity: 1;
    }

    /* --- FOOTER --- */
    #footer {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        font-size: 10px;
        opacity: 0.5;
        letter-spacing: 1px;
        background: rgba(0,0,0,0.2);
        border-top: 1px solid rgba(255,255,255,0.05);
        z-index: 25;
    }

    /* Utilities */
    .hidden { display: none !important; }
</style>
</head>
<body>

<div id="loadingScreen">
    <div id="loadingTitle">APEX ZERO</div>
    <div id="loadingBar"><div id="loadingFill"></div></div>
</div>

<div id="topBar">
    <div id="topBarLeft">OS_v1.0_STABLE</div>
    APEX ZERO
    <div id="topBarRight">
        <span id="profileName">BRYCE</span>
        <button id="notifBtn">NOTIF</button>
        <button id="settingsBtn">SETTINGS</button>
    </div>
</div>

<div id="shell">
    <div id="sidebar">
        <div class="sidebarGroup">
            <div class="sideSectionLabel">LIBRARY</div>
            <div class="sideLink active" data-category="all">All <span>ALL</span></div>
            <div class="sideLink" data-category="games">Games <span>G</span></div>
            <div class="sideLink" data-category="apps">Apps <span>A</span></div>
            <div class="sideLink" data-category="tools">Tools <span>T</span></div>
        </div>

        <div class="sidebarGroup" style="margin-top: auto;">
            <div class="sideSectionLabel">SYSTEM</div>
            <div class="sideLink" id="sideScrollGames">↑ Back to Top</div>
            <div class="sideLink" id="sideScrollRecent">↺ Recent History</div>
        </div>
    </div>

    <div id="mainArea">
        <div id="sectionHeaderRow">
            <div id="sectionLabel">EXPLORE MODULES</div>
            <input id="searchBox" type="text" placeholder="Search systems...">
        </div>

        <div id="grid"></div>

        <div id="recentPanel">
            <div id="recentHeaderRow">
                <div id="recentTitle">RECENT ACTIVITY</div>
                <button id="clearRecentBtn">PURGE</button>
            </div>
            <div id="recentList">
                <div class="sideSectionLabel" style="padding:0; opacity: 0.3;">No recent modules launched.</div>
            </div>
        </div>

        <div id="windowLayer"></div>
    </div>
</div>

<div id="dock">
    <div class="dockItem" id="dockHome">HOME</div>
    <div class="dockItem" id="dockGames">GAMES</div>
    <div class="dockItem" id="dockRecent">RECENT</div>
    <div class="dockItem" id="dockNotes">NOTES</div>
    <div class="dockItem" id="dockCalc">CALC</div>
    <div class="dockItem" id="dockTimer">TIMER</div>
    <div class="dockItem" id="dockTerminal">TERM</div>
    <div class="dockItem" id="dockCanvas">CANVAS</div>
    <div class="dockItem" id="dockSettings">SETTINGS</div>
</div>

<div id="footer">
    <div id="footerLeft">SYSTEM CORE ACTIVE</div>
    <div id="footerRight">
        <span id="footerClock">00:00</span>
        <span id="footerUptime" style="margin-left: 15px;">UPTIME 0:00</span>
    </div>
</div>

<script>
    // --- BASIC LOGIC TO RENDER GRID ---
    let games = [
        { id: "2048cupcakes", name: "2048 Cupcakes", category: "games", desc: "Classic 2048 with cupcakes." },
        { id: "agariolite", name: "Agario Lite", category: "games", desc: "Lightweight agar-style multiplayer." },
        { id: "cookieclicker", name: "Cookie Clicker", category: "games", desc: "Endless cookie clicking madness." },
        { id: "mc1122", name: "Minecraft 1.12.2", category: "games", desc: "Sandbox survival and creativity." },
        { id: "notes", name: "Zero Notes", category: "apps", desc: "Local glass notes for quick thoughts." },
        { id: "calculator", name: "Zero Calc", category: "apps", desc: "Clean, monochrome calculator." },
        { id: "timer", name: "Zero Timer", category: "tools", desc: "Focus timer and countdown." }
    ];

    const grid = document.getElementById("grid");
    const searchBox = document.getElementById("searchBox");
    const sideLinks = document.querySelectorAll(".sideLink[data-category]");

    function renderGrid(filter = "all", query = "") {
        grid.innerHTML = "";
        games.filter(g => {
            const matchesCat = filter === "all" || g.category === filter;
            const matchesSearch = g.name.toLowerCase().includes(query.toLowerCase());
            return matchesCat && matchesSearch;
        }).forEach(g => {
            const card = document.createElement("div");
            card.className = "icon";
            card.innerHTML = `<div class="iconTitle">${g.name}</div><div class="iconDesc">${g.desc}</div>`;
            grid.appendChild(card);
        });
    }

    // Sidebar Filtering
    sideLinks.forEach(link => {
        link.onclick = () => {
            sideLinks.forEach(l => l.classList.remove("active"));
            link.classList.add("active");
            renderGrid(link.dataset.category, searchBox.value);
        };
    });

    // Search Filtering
    searchBox.oninput = () => {
        const activeCat = document.querySelector(".sideLink.active").dataset.category;
        renderGrid(activeCat, searchBox.value);
    };

    // Update Clock
    setInterval(() => {
        const now = new Date();
        document.getElementById("footerClock").textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    }, 1000);

    // Initial Render
    renderGrid();
</script>

</body>
</html>
