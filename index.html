<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apex Zero Launcher</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="dark">
    <div id="app">
        <header class="top-bar">
            <div class="logo">APEX ZERO</div>
            <div class="top-right">
                <div class="search-wrap">
                    <input id="search-input" type="text" placeholder="Search games…">
                </div>
                <div id="fps-counter" class="fps">FPS</div>
            </div>
        </header>

        <main class="main-layout">
            <section class="panel-left">
                <div class="panel-section">
                    <div class="panel-title">Categories</div>
                    <div class="tabs" id="category-tabs">
                        <button class="tab active" data-category="all">All</button>
                        <button class="tab" data-category="Arcade">Arcade</button>
                        <button class="tab" data-category="Puzzle">Puzzle</button>
                    </div>
                </div>
            </section>

            <section class="panel-main">
                <div class="grid-header">
                    <h1>Library</h1>
                    <span class="grid-subtitle">Select a game to launch</span>
                </div>
                <div id="game-grid" class="game-grid">
                    <!-- Filled by APEX_RENDER -->
                </div>
            </section>
        </main>
    </div>

    <!-- Launch Modal -->
    <div id="launch-modal" class="modal">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">Game Launcher</span>
                <button id="launch-close" class="modal-close">✕</button>
            </div>
            <div class="modal-body">
                <iframe id="launch-frame" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
