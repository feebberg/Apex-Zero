<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Zero</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- HEADER -->
    <div id="topBar">
        <div id="logo">APEX ZERO</div>

        <div id="searchContainer">
            <input id="searchInput" type="text" placeholder="Search games...">
        </div>

        <div id="headerButtons">
            <button id="openSettings">Settings</button>
            <button id="toggleFPS">FPS</button>
        </div>
    </div>

    <!-- TABS -->
    <div id="tabs">
        <button class="tab-btn active" data-tab="all">All Games</button>
        <button class="tab-btn" data-tab="recent">Recent</button>
        <button class="tab-btn" data-tab="favorites">Favorites</button>
    </div>

    <!-- TAB CONTENT -->
    <div id="tab-all" class="tab-content">
        <div id="gameGrid" class="grid"></div>
    </div>

    <div id="tab-recent" class="tab-content" style="display:none;">
        <div id="recentGrid" class="grid"></div>
    </div>

    <div id="tab-favorites" class="tab-content" style="display:none;">
        <div id="favoritesGrid" class="grid"></div>
    </div>

    <!-- SETTINGS PANEL -->
    <div id="settingsPanel" class="side-panel">
        <div class="panel-header">
            <h2>Settings</h2>
            <button id="closeSettings">Close</button>
        </div>

        <div class="panel-content">
            <h3>Theme</h3>
            <select id="themeSelect">
                <option value="dark">Dark</option>
                <option value="light">Light</option>
            </select>

            <h3>Layout</h3>
            <select id="layoutSelect">
                <option value="grid">Grid</option>
                <option value="list">List</option>
            </select>
        </div>
    </div>

    <!-- LAUNCH OVERLAY -->
    <div id="launchOverlay" class="launch-overlay">
        <div class="launch-box">
            <img id="launchThumb" src="" alt="">
            <h2 id="launchTitle"></h2>

            <div class="launch-buttons">
                <button id="playBtn">Play</button>
                <button id="cancelLaunch">Cancel</button>
            </div>
        </div>
    </div>

    <!-- FPS COUNTER -->
    <div id="fpsCounter"></div>

    <!-- SCRIPTS -->

    <!-- CORE -->
    <script src="js/core/autoscan.js"></script>
    <script src="js/core/storage.js"></script>
    <script src="js/core/settings.js"></script>
    <script src="js/core/theme.js"></script>
    <script src="js/core/layout.js"></script>
    <script src="js/core/render.js"></script>
    <script src="js/core/launch.js"></script>
    <script src="js/core/fps.js"></script>
    <script src="js/core/search.js"></script>

    <!-- UI -->
    <script src="js/ui/panel.js"></script>
    <script src="js/ui/tabs.js"></script>
    <script src="js/ui/events.js"></script>

    <!-- ROOT -->
    <script src="js/games.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
