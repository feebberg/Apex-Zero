<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apex Zero OS</title>

<style>
    body {
        margin: 0;
        background: #000;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        overflow: hidden;
    }

    /* Loading Screen */
    #loadingScreen {
        position: fixed;
        inset: 0;
        background: black;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        animation: fadeOut 1s ease forwards;
        animation-delay: 3.5s;
    }

    #loadingText {
        font-size: 22px;
        letter-spacing: 2px;
        margin-bottom: 20px;
        text-align: center;
    }

    #loadingBar {
        width: 300px;
        height: 6px;
        background: #222;
        border-radius: 3px;
        overflow: hidden;
    }

    #loadingFill {
        width: 0%;
        height: 100%;
        background: white;
        animation: loadBar 3s ease forwards;
    }

    @keyframes loadBar {
        to { width: 100%; }
    }

    @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
    }

    /* Desktop */
    #desktop {
        opacity: 0;
        animation: fadeIn 1s ease forwards;
        animation-delay: 4s;
        padding: 40px;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    /* Icons */
    .icon {
        width: 110px;
        text-align: center;
        margin: 20px;
        display: inline-block;
        cursor: pointer;
    }

    .icon img {
        width: 80px;
        height: 80px;
        border-radius: 12px;
        background: white;
        padding: 10px;
        transition: 0.2s;
    }

    .icon img:hover {
        transform: scale(1.1);
        background: #dcdcdc;
    }

    .icon span {
        display: block;
        margin-top: 8px;
        font-size: 14px;
        letter-spacing: 1px;
    }

    /* Window */
    #window {
        position: fixed;
        top: 50%;
        left: 50%;
        width: 80%;
        height: 80%;
        transform: translate(-50%, -50%);
        background: #0a0a0f;
        border: 2px solid white;
        border-radius: 8px;
        display: none;
        flex-direction: column;
        z-index: 5000;
    }

    #windowHeader {
        padding: 12px;
        background: white;
        color: black;
        font-weight: bold;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    #closeBtn {
        cursor: pointer;
        font-size: 20px;
        padding: 0 10px;
    }

    #windowFrame {
        flex: 1;
        border: none;
        width: 100%;
        height: 100%;
    }

    /* Footer */
    #footer {
        position: fixed;
        bottom: 10px;
        right: 20px;
        font-size: 14px;
        color: #555;
        letter-spacing: 1px;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
        animation-delay: 4.5s;
    }
</style>

<script>
    function openGame(title, file) {
        document.getElementById("windowTitle").innerText = title;
        document.getElementById("windowFrame").src = file;
        document.getElementById("window").style.display = "flex";
    }

    function closeWindow() {
        document.getElementById("window").style.display = "none";
        document.getElementById("windowFrame").src = "";
    }
</script>

</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen">
    <div id="loadingText">APEX ZERO SYSTEMS<br>Initializing Core Modules...</div>
    <div id="loadingBar"><div id="loadingFill"></div></div>
</div>

<!-- Desktop -->
<div id="desktop">

    <!-- Icons -->
    <div class="icon" onclick="openGame('2048 Cupcakes', '2048cupcakes.html')">
        <img src="https://i.imgur.com/8Q1ZQ0T.png">
        <span>2048 Cupcakes</span>
    </div>

    <div class="icon" onclick="openGame('Agario Lite', 'agariolite.html')">
        <img src="https://i.imgur.com/8Q1ZQ0T.png">
        <span>Agario Lite</span>
    </div>

    <div class="icon" onclick="openGame('Cookie Clicker', 'cookieclicker (1).htm')">
        <img src="https://i.imgur.com/8Q1ZQ0T.png">
        <span>Cookie Clicker</span>
    </div>

    <div class="icon" onclick="openGame('Minecraft 1.12.2', 'Eaglercraft_1.12.2_WASM_Offline_Download (2).html')">
        <img src="https://i.imgur.com/8Q1ZQ0T.png">
        <span>Minecraft 1.12.2</span>
    </div>

    <div class="icon" onclick="openGame('Paper.io 2', 'paperio2.htm')">
        <img src="https://i.imgur.com/8Q1ZQ0T.png">
        <span>Paper.io 2</span>
    </div>

    <div class="icon" onclick="openGame('Rooftop Snipers 2', 'rooftopsnipers2.html')">
        <img src="https://i.imgur.com/8Q1ZQ0T.png">
        <span>Rooftop Snipers 2</span>
    </div>

</div>

<!-- Window -->
<div id="window">
    <div id="windowHeader">
        <span id="windowTitle">Game</span>
        <span id="closeBtn" onclick="closeWindow()">✕</span>
    </div>
    <iframe id="windowFrame"></iframe>
</div>

<!-- Footer -->
<div id="footer">© 2026 Apex Zero Systems — feebberg</div>

</body>
</html>
