<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apex Zero OS</title>

<style>
    body {
        margin: 0;
        background: #000;
        font-family: 'Segoe UI', sans-serif;
        color: white;
        overflow: hidden;
    }

    /* Loading Screen */
    #loadingScreen {
        position: fixed;
        inset: 0;
        background: black;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        animation: fadeOut 1s ease forwards;
        animation-delay: 3.5s;
    }

    #loadingText {
        font-size: 22px;
        letter-spacing: 2px;
        margin-bottom: 20px;
        text-align: center;
    }

    #loadingBar {
        width: 300px;
        height: 6px;
        background: #222;
        border-radius: 3px;
        overflow: hidden;
    }

    #loadingFill {
        width: 0%;
        height: 100%;
        background: white;
        animation: loadBar 3s ease forwards;
    }

    @keyframes loadBar {
        to { width: 100%; }
    }

    @keyframes fadeOut {
        to { opacity: 0; visibility: hidden; }
    }

    /* Desktop */
    #desktop {
        opacity: 0;
        animation: fadeIn 1s ease forwards;
        animation-delay: 4s;
        padding: 40px;
        position: relative;
        z-index: 2;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }

    /* Centered Apex Zero watermark logo */
    #watermark {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0.06;
        z-index: 1;
        pointer-events: none;
    }

    /* Icons */
    .icon {
        width: 110px;
        text-align: center;
        margin: 20px;
        display: inline-block;
        cursor: pointer;
    }

    .iconBox {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: white;
        color: black;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 1px;
        transition: 0.2s;
        box-shadow: 0 0 0px rgba(255,255,255,0);
    }

    .iconBox:hover {
        transform: scale(1.08);
        box-shadow: 0 0 18px rgba(255,255,255,0.7);
    }

    .icon span {
        display: block;
        margin-top: 8px;
        font-size: 14px;
        letter-spacing: 1px;
    }

    /* Footer */
    #footer {
        position: fixed;
        bottom: 10px;
        right: 20px;
        font-size: 14px;
        color: #555;
        letter-spacing: 1px;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
        animation-delay: 4.5s;
        z-index: 3;
    }
</style>

<script>
    /* TRUE FULLSCREEN LAUNCH */
    function openGameFullscreen(file) {
        const win = window.open(file, "_blank");

        if (!win) return; // popup blocked

        // Try to request fullscreen once the new tab loads
        win.onload = () => {
            try {
                win.document.documentElement.requestFullscreen();
            } catch (e) {
                // Some games request fullscreen themselves
            }
        };
    }
</script>

</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen">
    <div id="loadingText">APEX ZERO SYSTEMS<br>Initializing Core Modules...</div>
    <div id="loadingBar"><div id="loadingFill"></div></div>
</div>

<!-- Centered Apex Zero watermark logo -->
<div id="watermark">
    <svg width="260" height="260" viewBox="0 0 200 200" fill="none"
         xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="90" stroke="white" stroke-width="6"/>
        <path d="M60 130 L100 40 L140 130 Z" stroke="white" stroke-width="6" fill="none"/>
        <rect x="85" y="130" width="30" height="30" stroke="white" stroke-width="6" fill="none"/>
    </svg>
</div>

<!-- Desktop -->
<div id="desktop">

    <div class="icon" onclick="openGameFullscreen('2048cupcakes.html')">
        <div class="iconBox">2048</div>
        <span>2048 Cupcakes</span>
    </div>

    <div class="icon" onclick="openGameFullscreen('agariolite.html')">
        <div class="iconBox">AG</div>
        <span>Agario Lite</span>
    </div>

    <div class="icon" onclick="openGameFullscreen('cookieclicker (1).htm')">
        <div class="iconBox">CK</div>
        <span>Cookie Clicker</span>
    </div>

    <div class="icon" onclick="openGameFullscreen('Eaglercraft_1.12.2_WASM_Offline_Download (2).html')">
        <div class="iconBox">MC</div>
        <span>Minecraft 1.12.2</span>
    </div>

    <div class="icon" onclick="openGameFullscreen('paperio2.htm')">
        <div class="iconBox">P2</div>
        <span>Paper.io 2</span>
    </div>

    <div class="icon" onclick="openGameFullscreen('rooftopsnipers2.html')">
        <div class="iconBox">RS2</div>
        <span>Rooftop Snipers 2</span>
    </div>

</div>

<!-- Footer -->
<div id="footer">© 2026 Apex Zero Systems — feebberg</div>

</body>
</html>
