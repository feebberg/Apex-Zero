<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Apex Zero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- PREMIUM LOADING SCREEN -->
    <div id="apex-loading">
        <div class="loading-bg"></div>

        <div class="loading-center">
            <div class="loading-logo">APEX ZERO</div>

            <div class="loading-progress">
                <div class="loading-bar"></div>
            </div>

            <div class="loading-status">Initializing...</div>
        </div>
    </div>

    <!-- YOUR EXISTING LAUNCHER UI -->
    <div id="app">
        <!-- put your launcher layout here -->
        <div id="launcher-root"></div>

        <!-- launch prompt example -->
        <div id="launchPrompt" class="hidden">
            <div class="prompt-content">
                <p>Launch this game?</p>
                <button id="cancelLaunch">Cancel</button>
                <button id="confirmLaunch">Launch</button>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
