<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apex Zero</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    /* Top Title */
    #title {
        text-align: center;
        padding: 20px 0;
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 4px;
    }

    /* Icon Grid */
    #grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 20px;
        padding: 20px;
        max-width: 1000px;
        margin: auto;
    }

    .icon {
        border: 2px solid #fff;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        transition: 0.15s;
        font-size: 14px;
    }

    .icon:hover {
        background: #fff;
        color: #000;
    }

    /* Overlay */
    #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: none;
        align-items: center;
        justify-content: center;
    }

    #overlayBox {
        background: #fff;
        color: #000;
        padding: 30px;
        width: 300px;
        text-align: center;
    }

    #overlayBox button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: 2px solid #000;
        background: #fff;
        cursor: pointer;
        font-weight: bold;
    }

    #overlayBox button:hover {
        background: #000;
        color: #fff;
    }
</style>

</head>
<body>

<div id="title">APEX ZERO</div>

<div id="grid">
    <div class="icon" data-url="2048cupcakes.html">2048 Cupcakes</div>
    <div class="icon" data-url="agariolite.html">Agario Lite</div>
    <div class="icon" data-url="cookieclicker (1).htm">Cookie Clicker</div>
    <div class="icon" data-url="Eaglercraft_1.12.2_WASM_Offline_Download (2).html">Minecraft 1.12.2</div>
    <div class="icon" data-url="paperio2.htm">Paper.io 2</div>
    <div class="icon" data-url="rooftopsnipers2.html">Rooftop Snipers 2</div>
</div>

<!-- Overlay -->
<div id="overlay">
    <div id="overlayBox">
        <div id="gameTitle">Game</div>
        <button id="launchBtn">Launch</button>
        <button id="cancelBtn">Cancel</button>
    </div>
</div>

<script>
    const overlay = document.getElementById("overlay");
    const gameTitle = document.getElementById("gameTitle");
    const launchBtn = document.getElementById("launchBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    let pendingURL = null;

    document.querySelectorAll(".icon").forEach(icon => {
        icon.addEventListener("click", () => {
            pendingURL = icon.dataset.url;
            gameTitle.textContent = icon.textContent;
            overlay.style.display = "flex";
        });
    });

    launchBtn.onclick = () => {
        if (pendingURL) window.open(pendingURL, "_blank");
        overlay.style.display = "none";
    };

    cancelBtn.onclick = () => {
        overlay.style.display = "none";
    };
</script>

</body>
</html>
