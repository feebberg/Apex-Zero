<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apex Zero</title>

<style>
:root {
    --accent: #4fd1ff; /* main OS accent */
    --danger: #ff4b4b;
    --bg-dark: #02030a;
    --text-light: #ffffff;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    background: var(--bg-dark);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text-light);
    overflow: hidden;
}

/* ============================
   SPLASH SCREEN
============================ */
#splash {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at top, #1a2b5a 0, #000 55%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}
.splash-logo {
    width: 150px;
    height: 150px;
    animation: splashPulse 1.4s ease-in-out infinite;
}
.splash-text-main {
    margin-top: 14px;
    font-size: 24px;
    letter-spacing: 8px;
}
.splash-text-sub {
    margin-top: 4px;
    font-size: 11px;
    opacity: 0.7;
}
@keyframes splashPulse {
    0%   { transform: scale(1);   filter: drop-shadow(0 0 0 #4fd1ff); }
    50%  { transform: scale(1.06); filter: drop-shadow(0 0 18px #4fd1ff); }
    100% { transform: scale(1);   filter: drop-shadow(0 0 0 #4fd1ff); }
}
.splash-hide {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
}

/* ============================
   BACKGROUND WATERMARK
============================ */
#watermark {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.06;
    z-index: 1;
    pointer-events: none;
}
.apex-logo {
    fill: none;
    stroke: white;
}

/* ============================
   TITLE BAR
============================ */
#titleBarContainer {
    position: fixed;
    top: 18px;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 0.7s ease forwards;
    animation-delay: 0.6s;
}
#titleBar {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 4px;
}
@keyframes fadeIn { to { opacity: 1; } }

/* ============================
   SETTINGS BUTTON
============================ */
#settingsBtn {
    position: fixed;
    top: 18px;
    right: 26px;
    font-size: 14px;
    padding: 6px 12px;
    border: 2px solid white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    opacity: 0;
    animation: fadeIn 0.7s ease forwards;
    animation-delay: 0.8s;
    z-index: 10;
}
#settingsBtn:hover {
    background: white;
    color: black;
    transform: translateY(-1px);
}

/* ============================
   PANELS (Settings, Admin)
============================ */
.panel {
    position: fixed;
    background: rgba(0,0,0,0.9);
    border: 2px solid var(--accent);
    border-radius: 14px;
    padding: 16px;
    z-index: 20;
}
#settingsPanel {
    top: 70px;
    right: 26px;
    width: 260px;
    display: none;
}
#adminPanel {
    top: 70px;
    left: 26px;
    width: 300px;
    display: none;
}

/* ============================
   CLOSE BUTTON
============================ */
#closeAdminBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: 2px solid white;
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* ============================
   MODALS (Password Setup)
============================ */
.modalOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}
.modalBox {
    background: #080910;
    padding: 22px;
    border-radius: 14px;
    border: 2px solid var(--accent);
    width: 320px;
    text-align: center;
}
.modalBox input {
    width: 100%;
    padding: 8px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #05060b;
    color: white;
}
.modalBox button {
    margin-top: 12px;
    padding: 8px 16px;
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
}

/* ============================
   RECENTLY PLAYED STRIP
============================ */
#recentContainer {
    width: 100%;
    text-align: center;
    margin-top: 70px;
    margin-bottom: 10px;
    display: none;
    animation: fadeIn 0.4s ease;
    z-index: 6;
    position: relative;
}
#recentTitle {
    font-size: 14px;
    letter-spacing: 3px;
    opacity: 0.7;
    margin-bottom: 6px;
}
#recentItems {
    display: flex;
    justify-content: center;
    gap: 14px;
    flex-wrap: wrap;
}
.recentItem {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    font-size: 13px;
}
.recentItem:hover {
    border-color: var(--accent);
    box-shadow: 0 0 10px rgba(79,209,255,0.4);
}
.recentDot {
    width: 10px;
    height: 10px;
    background: var(--accent);
    border-radius: 3px;
}

/* ============================
   DESKTOP GRID
============================ */
#desktop {
    position: fixed;
    top: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    height: calc(100% - 140px);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    grid-auto-rows: 140px;
    gap: 40px;
    padding-bottom: 40px;
    overflow-y: auto;
    z-index: 5;
}
.desktopIcon {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    cursor: pointer;
    transition: 0.18s;
}
.desktopIcon:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(79,209,255,0.4);
}
.desktopIcon .iconLabel {
    margin-top: 6px;
    font-size: 14px;
    text-align: center;
}

/* ============================
   DANGER ZONE
============================ */
#dangerToggle {
    color: var(--danger);
    cursor: pointer;
    margin-top: 14px;
    font-size: 14px;
}
#dangerZone button {
    width: 100%;
    padding: 8px;
    background: var(--danger);
    border: none;
    border-radius: 8px;
    color: white;
    margin-top: 8px;
    cursor: pointer;
    font-size: 14px;
}
</style>
</head>
<body>

<!-- ============================
     SPLASH SCREEN
============================ -->
<div id="splash">
    <svg class="splash-logo" viewBox="0 0 100 100">
        <path class="apex-logo" d="M10 80 L50 10 L90 80 Z" stroke-width="6"/>
    </svg>
    <div class="splash-text-main">APEX ZERO</div>
    <div class="splash-text-sub">SYSTEM BOOTING</div>
</div>

<!-- ============================
     BACKGROUND WATERMARK
============================ -->
<div id="watermark">
    <svg width="300" height="300" viewBox="0 0 100 100">
        <path class="apex-logo" d="M10 80 L50 10 L90 80 Z" stroke-width="4"/>
    </svg>
</div>

<!-- ============================
     TITLE BAR
============================ -->
<div id="titleBarContainer">
    <div id="titleBar">APEX ZERO</div>
</div>

<!-- ============================
     SETTINGS BUTTON
============================ -->
<div id="settingsBtn">Settings</div>

<!-- ============================
     SETTINGS PANEL
============================ -->
<div id="settingsPanel" class="panel">
    <h3>Settings</h3>

    <label>Theme Preset</label>
    <select id="themePreset">
        <option value="blue">Blue</option>
        <option value="purple">Purple</option>
        <option value="red">Red</option>
        <option value="green">Green</option>
        <option value="mono">Monochrome</option>
    </select>

    <br><br>

    <label>Background Style</label>
    <select id="backgroundStyle">
        <option value="dark">Dark</option>
        <option value="grid">Grid</option>
        <option value="gradient">Gradient</option>
        <option value="scanlines">Scanlines</option>
    </select>

    <br><br>

    <label>Layout Mode</label>
    <select id="layoutMode">
        <option value="grid">Grid</option>
        <option value="compact">Compact</option>
        <option value="wide">Wide</option>
    </select>

    <br><br>

    <label>Icon Shape</label>
    <select id="iconShape">
        <option value="rounded">Rounded</option>
        <option value="square">Square</option>
        <option value="pill">Pill</option>
    </select>
</div>

<!-- ============================
     ADMIN PANEL
============================ -->
<div id="adminPanel" class="panel">
    <button id="closeAdminBtn">Close</button>
    <h3>Admin Panel</h3>

    <label>Grid Spacing</label>
    <input type="range" id="gridSpacing" min="10" max="80" value="40">

    <label>Icon Radius</label>
    <input type="range" id="iconRadius" min="0" max="60" value="14">

    <label>Watermark Opacity</label>
    <input type="range" id="watermarkOpacity" min="0" max="100" value="6">

    <label>Title Size</label>
    <input type="range" id="titleSize" min="20" max="60" value="30">

    <h4>Game Manager</h4>
    <div id="gameList" style="max-height:200px; overflow-y:auto;"></div>
    <button id="addGameBtn" style="margin-top:10px;">Add Game</button>

    <div id="dangerToggle">Danger Zone ▼</div>
    <div id="dangerZone" style="display:none;">
        <button id="resetSystem">Reset System</button>
        <button id="resetPassword">Reset Admin Password</button>
    </div>
</div>

<!-- ============================
     PASSWORD SETUP MODAL
============================ -->
<div id="passwordSetupModal" class="modalOverlay">
    <div class="modalBox">
        <h3>Set Admin Password</h3>
        <input id="newAdminPassword" type="password" placeholder="New password">
        <button id="saveAdminPassword">Save Password</button>
    </div>
</div>

<!-- ============================
     ADMIN PASSWORD ENTRY
============================ -->
<div id="adminPasswordModal" class="modalOverlay">
    <div class="modalBox">
        <h3>Enter Admin Password</h3>
        <input id="adminPasswordInput" type="password" placeholder="Password">
        <button id="adminPasswordSubmit">Enter</button>
    </div>
</div>

<!-- ============================
     RECENTLY PLAYED STRIP
============================ -->
<div id="recentContainer">
    <div id="recentTitle">RECENTLY PLAYED</div>
    <div id="recentItems"></div>
</div>

<!-- ============================
     DESKTOP GRID
============================ -->
<div id="desktop"></div>

<script>
/* ============================
   GAME LIST (DEFAULT)
============================ */
let games = [
    { name: "2048 Cupcakes", url: "2048cupcakes.html" },
    { name: "Agario Lite", url: "agariolite.html" },
    { name: "Cookie Clicker", url: "cookieclicker (1).htm" },
    { name: "Minecraft 1.12.2", url: "Eaglercraft_1.12.2_WASM_Offline_Download.html" },
    { name: "Paper.io 2", url: "paperio2.htm" },
    { name: "Rooftop Snipers 2", url: "rooftopsnipers2.html" }
];

let currentIconRadius = 14;

/* ============================
   RECENTLY PLAYED SYSTEM
============================ */
let recentlyPlayed = JSON.parse(localStorage.getItem("recentlyPlayed") || "[]");

function addRecentlyPlayed(game) {
    recentlyPlayed = recentlyPlayed.filter(g => g.name !== game.name);
    recentlyPlayed.unshift(game);
    if (recentlyPlayed.length > 5) recentlyPlayed.pop();
    localStorage.setItem("recentlyPlayed", JSON.stringify(recentlyPlayed));
    renderRecentlyPlayed();
}

function renderRecentlyPlayed() {
    const container = document.getElementById("recentContainer");
    const items = document.getElementById("recentItems");

    if (recentlyPlayed.length === 0) {
        container.style.display = "none";
        return;
    }

    container.style.display = "block";
    items.innerHTML = "";

    recentlyPlayed.forEach(game => {
        const item = document.createElement("div");
        item.className = "recentItem";
        item.innerHTML = `
            <div class="recentDot"></div>
            <span>${game.name}</span>
        `;
        item.addEventListener("click", () => window.open(game.url, "_blank"));
        items.appendChild(item);
    });
}

/* ============================
   SPLASH SCREEN
============================ */
window.addEventListener("load", () => {
    const splash = document.getElementById("splash");

    setTimeout(() => {
        splash.classList.add("splash-hide");
        setTimeout(() => {
            splash.style.display = "none";
        }, 500);
    }, 1600);

    const stored = localStorage.getItem("adminPassword");
    if (!stored) {
        document.getElementById("passwordSetupModal").style.display = "flex";
    }

    const storedGames = localStorage.getItem("games");
    if (storedGames) {
        try {
            games = JSON.parse(storedGames);
            games.sort((a, b) => a.name.localeCompare(b.name));
        } catch {}
    } else {
        games.sort((a, b) => a.name.localeCompare(b.name));
    }

    renderDesktop();
    renderRecentlyPlayed();
});

/* ============================
   DESKTOP RENDER
============================ */
function renderDesktop() {
    const desktop = document.getElementById("desktop");
    desktop.innerHTML = "";

    games.forEach((game) => {
        const icon = document.createElement("div");
        icon.className = "desktopIcon";
        icon.style.borderRadius = currentIconRadius + "px";

        icon.innerHTML = `
            <div style="font-size:40px;">🎮</div>
            <div class="iconLabel">${game.name}</div>
        `;

        icon.addEventListener("click", () => {
            addRecentlyPlayed(game);
            window.open(game.url, "_blank");
        });

        desktop.appendChild(icon);
    });
}

/* ============================
   PASSWORD SETUP
============================ */
document.getElementById("saveAdminPassword").addEventListener("click", () => {
    const pw = document.getElementById("newAdminPassword").value.trim();
    if (!pw) { alert("Password cannot be empty."); return; }
    localStorage.setItem("adminPassword", pw);
    document.getElementById("passwordSetupModal").style.display = "none";
});

/* ============================
   SECRET ADMIN TRIGGER (Shift+A → Z)
============================ */
let awaitingZ = false;
document.addEventListener("keydown", (e) => {
    if (e.shiftKey && e.key.toLowerCase() === "a") {
        awaitingZ = true;
        return;
    }
    if (awaitingZ && e.key.toLowerCase() === "z") {
        awaitingZ = false;
        if (!localStorage.getItem("adminPassword")) return;
        document.getElementById("adminPasswordModal").style.display = "flex";
    } else {
        awaitingZ = false;
    }
});

/* ============================
   ADMIN PASSWORD CHECK
============================ */
document.getElementById("adminPasswordSubmit").addEventListener("click", () => {
    const stored = localStorage.getItem("adminPassword");
    const entered = document.getElementById("adminPasswordInput").value;

    if (entered === stored) {
        document.getElementById("adminPasswordModal").style.display = "none";
        openAdminPanel();
    } else {
        alert("Incorrect password.");
    }
});

/* ============================
   ADMIN PANEL
============================ */
function openAdminPanel() {
    document.getElementById("adminPanel").style.display = "block";
    hookAdminControls();
    updateGameList();
}

document.getElementById("closeAdminBtn").addEventListener("click", () => {
    document.getElementById("adminPanel").style.display = "none";
});

/* ============================
   ADMIN CONTROLS
============================ */
function hookAdminControls() {
    const spacing = document.getElementById("gridSpacing");
    const radius = document.getElementById("iconRadius");
    const opacity = document.getElementById("watermarkOpacity");
    const titleSize = document.getElementById("titleSize");

    spacing.oninput = () => {
        document.getElementById("desktop").style.gap = spacing.value + "px";
    };
    radius.oninput = () => {
        currentIconRadius = radius.value;
        renderDesktop();
    };
    opacity.oninput = () => {
        document.getElementById("watermark").style.opacity = opacity.value / 100;
    };
    titleSize.oninput = () => {
        document.getElementById("titleBar").style.fontSize = titleSize.value + "px";
    };
}

/* ============================
   GAME MANAGER
============================ */
function updateGameList() {
    const list = document.getElementById("gameList");
    list.innerHTML = "";

    games.forEach((game, index) => {
        const row = document.createElement("div");
        row.style.display = "flex";
        row.style.justifyContent = "space-between";
        row.style.alignItems = "center";
        row.style.padding = "4px 0";
        row.style.borderBottom = "1px solid rgba(255,255,255,0.1)";

        const nameSpan = document.createElement("span");
        nameSpan.textContent = game.name;

        const removeBtn = document.createElement("button");
        removeBtn.textContent = "Remove";
        removeBtn.style.padding = "3px 8px";
        removeBtn.style.background = "var(--danger)";
        removeBtn.style.border = "none";
        removeBtn.style.borderRadius = "6px";
        removeBtn.style.cursor = "pointer";
        removeBtn.style.fontSize = "12px";

        removeBtn.addEventListener("click", () => {
            games.splice(index, 1);
            games.sort((a, b) => a.name.localeCompare(b.name));
            localStorage.setItem("games", JSON.stringify(games));
            renderDesktop();
            updateGameList();
        });

        row.appendChild(nameSpan);
        row.appendChild(removeBtn);
        list.appendChild(row);
    });
}

document.getElementById("addGameBtn").addEventListener("click", () => {
    const name = prompt("Game name:");
    if (!name) return;

    const url = prompt("Game URL or filename:");
    if (!url) return;

    games.push({ name, url });
    games.sort((a, b) => a.name.localeCompare(b.name));
    localStorage.setItem("games", JSON.stringify(games));
    renderDesktop();
    updateGameList();
});

/* ============================
   DANGER ZONE
============================ */
document.getElementById("dangerToggle").addEventListener("click", () => {
    const dz = document.getElementById("dangerZone");
    dz.style.display = dz.style.display === "none" ? "block" : "none";
});

document.getElementById("resetSystem").addEventListener("click", () => {
    if (!confirm("Reset all settings and games?")) return;
    localStorage.clear();
    location.reload();
});

document.getElementById("resetPassword").addEventListener("click", () => {
    if (!confirm("Reset admin password?")) return;
    localStorage.removeItem("adminPassword");
    location.reload();
});

/* ============================
   SETTINGS PANEL
============================ */
document.getElementById("settingsBtn").addEventListener("click", () => {
    const panel = document.getElementById("settingsPanel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
});

/* ============================
   THEME PRESETS
============================ */
document.getElementById("themePreset").addEventListener("change", (e) => {
    const theme = e.target.value;

    if (theme === "blue") {
        document.body.style.background = "#02030a";
        document.documentElement.style.setProperty("--accent", "#4fd1ff");
    }
    if (theme === "purple") {
        document.body.style.background = "#0b0214";
        document.documentElement.style.setProperty("--accent", "#c26bff");
    }
    if (theme === "red") {
        document.body.style.background = "#140003";
        document.documentElement.style.setProperty("--accent", "#ff4b4b");
    }
    if (theme === "green") {
        document.body.style.background = "#00140a";
        document.documentElement.style.setProperty("--accent", "#00ff9a");
    }
    if (theme === "mono") {
        document.body.style.background = "#000000";
        document.documentElement.style.setProperty("--accent", "#ffffff");
    }
});

/* ============================
   BACKGROUND STYLES (SAFE)
============================ */
document.getElementById("backgroundStyle").addEventListener("change", (e) => {
    const bg = e.target.value;

    if (bg === "dark") {
        document.body.style.background = "#02030a";
    }
    if (bg === "grid") {
        document.body.style.background =
            "repeating-linear-gradient(0deg, #020202 0px, #020202 1px, #000 1px, #000 40px)," +
            "repeating-linear-gradient(90deg, #020202 0px, #020202 1px, #000 1px, #000 40px)";
    }
    if (bg === "gradient") {
        document.body.style.background =
            "linear-gradient(135deg, #02030a, #111b3a, #02030a)";
    }
    if (bg === "scanlines") {
        document.body.style.background =
            "repeating-linear-gradient(0deg, #000 0px, #000 2px, #020202 2px, #020202 4px)";
    }
});

/* ============================
   LAYOUT MODES
============================ */
document.getElementById("layoutMode").addEventListener("change", (e) => {
    const mode = e.target.value;
    const desktop = document.getElementById("desktop");

    if (mode === "grid") {
        desktop.style.gridTemplateColumns = "repeat(auto-fill, minmax(120px, 1fr))";
        desktop.style.gridAutoRows = "140px";
    }
    if (mode === "compact") {
        desktop.style.gridTemplateColumns = "repeat(auto-fill, minmax(100px, 1fr))";
        desktop.style.gridAutoRows = "120px";
    }
    if (mode === "wide") {
        desktop.style.gridTemplateColumns = "repeat(auto-fill, minmax(180px, 1fr))";
        desktop.style.gridAutoRows = "160px";
    }
});

/* ============================
   ICON SHAPE
============================ */
document.getElementById("iconShape").addEventListener("change", (e) => {
    const shape = e.target.value;

    if (shape === "rounded") currentIconRadius = 14;
    if (shape === "square") currentIconRadius = 0;
    if (shape === "pill") currentIconRadius = 40;

    renderDesktop();
});

/* ============================
   CLICK OUTSIDE TO CLOSE ADMIN
============================ */
document.addEventListener("click", (e) => {
    const panel = document.getElementById("adminPanel");

    if (panel.style.display === "block" && !panel.contains(e.target)) {
        if (
            !e.target.closest(".modalOverlay") &&
            e.target.id !== "settingsBtn" &&
            !document.getElementById("settingsPanel").contains(e.target)
        ) {
            panel.style.display = "none";
        }
    }
});
</script>

</body>
</html>
