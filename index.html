<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apex Zero</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: Arial, sans-serif;
    }

    /* Title */
    #title {
        text-align: center;
        padding: 25px 0;
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 4px;
    }

    /* Icon Grid */
    #grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 24px;
        padding: 20px;
        max-width: 1100px;
        margin: auto;
    }

    .icon {
        padding: 22px;
        text-align: center;
        cursor: pointer;
        border-radius: 14px;
        border: 1px solid rgba(255,255,255,0.25);
        background: rgba(255,255,255,0.06);
        backdrop-filter: blur(6px);
        transition: 0.2s;
        font-size: 15px;
    }

    .icon:hover {
        background: rgba(255,255,255,0.12);
        border-color: rgba(255,255,255,0.45);
    }

    /* Overlay */
    #overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.65);
        display: none;
        align-items: center;
        justify-content: center;
    }

    #overlayBox {
        width: 320px;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.25);
        backdrop-filter: blur(10px);
        padding: 30px;
        text-align: center;
        border-radius: 16px;
    }

    #overlayBox h2 {
        margin: 0 0 20px 0;
        font-size: 18px;
        letter-spacing: 2px;
    }

    .glassBtn {
        width: 100%;
        padding: 12px;
        margin-top: 12px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.35);
        background: rgba(255,255,255,0.08);
        backdrop-filter: blur(4px);
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        transition: 0.2s;
    }

    .glassBtn:hover {
        background: rgba(255,255,255,0.18);
        border-color: rgba(255,255,255,0.55);
    }
</style>

</head>
<body>

<div id="title">APEX ZERO</div>

<div id="grid">
    <div class="icon" data-url="2048cupcakes.html">2048 Cupcakes</div>
    <div class="icon" data-url="agariolite.html">Agario Lite</div>
    <div class="icon" data-url="cookieclicker (1).htm">Cookie Clicker</div>
    <div class="icon" data-url="Eaglercraft_1.12.2_WASM_Offline_Download (2).html">Minecraft 1.12.2</div>
    <div class="icon" data-url="paperio2.htm">Paper.io 2</div>
    <div class="icon" data-url="rooftopsnipers2.html">Rooftop Snipers 2</div>
</div>

<!-- Overlay -->
<div id="overlay">
    <div id="overlayBox">
        <h2 id="gameTitle">Game</h2>
        <button class="glassBtn" id="launchBtn">Launch</button>
        <button class="glassBtn" id="cancelBtn">Cancel</button>
    </div>
</div>

<script>
    const overlay = document.getElementById("overlay");
    const gameTitle = document.getElementById("gameTitle");
    const launchBtn = document.getElementById("launchBtn");
    const cancelBtn = document.getElementById("cancelBtn");

    let pendingURL = null;

    document.querySelectorAll(".icon").forEach(icon => {
        icon.addEventListener("click", () => {
            pendingURL = icon.dataset.url;
            gameTitle.textContent = icon.textContent;
            overlay.style.display = "flex";
        });
    });

    launchBtn.onclick = () => {
        if (pendingURL) window.open(pendingURL, "_blank");
        overlay.style.display = "none";
    };

    cancelBtn.onclick = () => {
        overlay.style.display = "none";
    };
</script>

</body>
</html>
