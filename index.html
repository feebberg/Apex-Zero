<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apex Zero</title>

<style>
:root {
    --accent: #4fd1ff;
    --danger: #ff4b4b;
    --bg-dark: #02030a;
    --text-light: #ffffff;
}
* { box-sizing: border-box; }

body {
    margin: 0;
    background: var(--bg-dark);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text-light);
    overflow: hidden;
}

/* Splash screen */
#splash {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2000;
}
.splash-logo {
    width: 140px;
    height: 140px;
    animation: glitch 0.9s ease-in-out 1;
}
.splash-text-main {
    margin-top: 14px;
    font-size: 22px;
    letter-spacing: 6px;
}
.splash-text-sub {
    margin-top: 4px;
    font-size: 11px;
    opacity: 0.7;
}
@keyframes glitch {
    0%   { transform: translate(0,0); filter: drop-shadow(0 0 0 #f00); }
    20%  { transform: translate(-3px,1px); filter: drop-shadow(-2px 0 #f00); }
    40%  { transform: translate(3px,-1px); filter: drop-shadow(2px 0 #0ff); }
    60%  { transform: translate(-2px,2px); filter: drop-shadow(-2px 0 #0ff); }
    80%  { transform: translate(2px,-2px); filter: drop-shadow(2px 0 #f0f); }
    100% { transform: translate(0,0); filter: drop-shadow(0 0 0 #000); }
}
.splash-hide {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

/* Login screen */
#loginScreen {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.96);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1500;
}

.login-box {
    background: #05060c;
    border: 2px solid var(--accent);
    border-radius: 16px;
    padding: 24px 26px 22px;
    width: 320px;
    text-align: center;
    box-shadow: 0 0 24px rgba(0,0,0,0.8);
    animation: loginFade 0.4s ease-out;
}

.login-logo {
    width: 80px;
    height: 80px;
    margin: 0 auto 10px;
}

.login-title {
    font-size: 18px;
    letter-spacing: 3px;
    margin-bottom: 4px;
}

.login-sub {
    font-size: 11px;
    opacity: 0.7;
    margin-bottom: 14px;
}

#loginPasswordInput {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: #02030a;
    color: white;
    margin-bottom: 10px;
}

#loginSubmitBtn {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: var(--accent);
    color: black;
    font-weight: 600;
    cursor: pointer;
}

.login-error {
    margin-top: 6px;
    font-size: 11px;
    color: #ff4b4b;
    min-height: 14px;
}

@keyframes loginFade {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

@keyframes loginShake {
    0% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
    100% { transform: translateX(0); }
}

/* Background logo */
#watermark {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    opacity: 0.06;
    z-index: 1;
    pointer-events: none;
}
.apex-logo {
    fill: none;
    stroke: white;
}

/* Title bar */
#titleBarContainer {
    position: fixed;
    top: 18px;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    z-index: 10;
    opacity: 0;
    animation: fadeIn 0.7s ease forwards;
    animation-delay: 0.4s;
}
#titleBar {
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 4px;
}
@keyframes fadeIn { to { opacity: 1; } }

/* Settings button */
#settingsBtn {
    position: fixed;
    top: 18px;
    right: 26px;
    font-size: 14px;
    padding: 6px 12px;
    border: 2px solid white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
    opacity: 0;
    animation: fadeIn 0.7s ease forwards;
    animation-delay: 0.6s;
    z-index: 10;
}
#settingsBtn:hover {
    background: white;
    color: black;
    transform: translateY(-1px);
}

/* Panels */
.panel {
    position: fixed;
    background: rgba(0,0,0,0.9);
    border: 2px solid var(--accent);
    border-radius: 14px;
    padding: 16px;
    z-index: 20;
}
#settingsPanel {
    top: 70px;
    right: 26px;
    width: 260px;
    display: none;
}
#adminPanel {
    top: 70px;
    left: 26px;
    width: 300px;
    display: none;
    position: fixed;
}

/* Close button */
#closeAdminBtn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: none;
    border: 2px solid white;
    color: white;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
}

/* Modals */
.modalOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 999;
}
.modalBox {
    background: #080910;
    padding: 22px;
    border-radius: 14px;
    border: 2px solid var(--accent);
    width: 320px;
    text-align: center;
}
.modalBox input {
    width: 100%;
    padding: 8px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    background: #05060b;
    color: white;
}
.modalBox button {
    margin-top: 12px;
    padding: 8px 16px;
    width: 100%;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
}

/* Desktop grid */
#desktop {
    position: fixed;
    top: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    height: calc(100% - 140px);
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    grid-auto-rows: 140px;
    gap: 40px;
    padding-bottom: 40px;
    overflow-y: auto;
    z-index: 5;
}
.desktopIcon {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    cursor: pointer;
    transition: 0.18s;
}
.desktopIcon:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(79,209,255,0.4);
}
.desktopIcon .iconLabel {
    margin-top: 6px;
    font-size: 14px;
    text-align: center;
}

/* Danger Zone */
#dangerToggle {
    color: var(--danger);
    cursor: pointer;
    margin-top: 14px;
    font-size: 14px;
}
#dangerZone button {
    width: 100%;
    padding: 8px;
    background: var(--danger);
    border: none;
    border-radius: 8px;
    color: white;
    margin-top: 8px;
    cursor: pointer;
    font-size: 14px;
}

select, input[type="range"] {
    width: 100%;
    margin-bottom: 10px;
}
</style>
</head>
<body>
<!-- SPLASH SCREEN -->
<div id="splash">
    <div class="splash-logo">
        <svg viewBox="0 0 200 200" class="apex-logo">
            <polygon points="100,20 60,90 140,90" stroke-width="10"/>
            <polygon points="60,110 20,180 100,180" stroke-width="10"/>
            <polygon points="100,180 180,180 140,110" stroke-width="10"/>
        </svg>
    </div>
    <div class="splash-text-main">APEX ZERO</div>
    <div class="splash-text-sub">BOOTING SYSTEM…</div>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
    <div class="login-box" id="loginBox">
        <div class="login-logo">
            <svg viewBox="0 0 200 200" class="apex-logo">
                <polygon points="100,20 60,90 140,90" stroke-width="10"/>
                <polygon points="60,110 20,180 100,180" stroke-width="10"/>
                <polygon points="100,180 180,180 140,110" stroke-width="10"/>
            </svg>
        </div>
        <div class="login-title">APEX ZERO</div>
        <div class="login-sub">LOGIN REQUIRED</div>

        <input id="loginPasswordInput" type="password" placeholder="Enter password">
        <button id="loginSubmitBtn">Login</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- BACKGROUND LOGO -->
<div id="watermark">
    <svg width="420" height="420" viewBox="0 0 200 200" class="apex-logo">
        <polygon points="100,20 60,90 140,90" stroke-width="10"/>
        <polygon points="60,110 20,180 100,180" stroke-width="10"/>
        <polygon points="100,180 180,180 140,110" stroke-width="10"/>
    </svg>
</div>

<!-- TITLE BAR -->
<div id="titleBarContainer">
    <svg width="34" height="34" viewBox="0 0 200 200" class="apex-logo">
        <polygon points="100,20 60,90 140,90" stroke-width="10"/>
        <polygon points="60,110 20,180 100,180" stroke-width="10"/>
        <polygon points="100,180 180,180 140,110" stroke-width="10"/>
    </svg>
    <div id="titleBar">APEX ZERO</div>
</div>

<!-- SETTINGS BUTTON -->
<div id="settingsBtn">Settings</div>

<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="panel">
    <h3 style="margin-top:0;">Settings</h3>

    <label><b>Theme</b></label>
    <select id="themePreset">
        <option value="blue">Blue Core</option>
        <option value="purple">Purple Neon</option>
        <option value="red">Red Pulse</option>
        <option value="green">Green Matrix</option>
        <option value="mono">Monochrome</option>
    </select>

    <label><b>Background</b></label>
    <select id="backgroundStyle">
        <option value="dark">Dark</option>
        <option value="grid">Grid</option>
        <option value="gradient">Gradient</option>
        <option value="scanlines">Scanlines</option>
    </select>

    <label><b>Layout</b></label>
    <select id="layoutMode">
        <option value="grid">Grid</option>
        <option value="compact">Compact</option>
        <option value="wide">Wide</option>
    </select>

    <label><b>Icon Shape</b></label>
    <select id="iconShape">
        <option value="rounded">Rounded</option>
        <option value="square">Square</option>
        <option value="pill">Pill</option>
    </select>
</div>

<!-- PASSWORD SETUP MODAL (ADMIN) -->
<div id="passwordSetupModal" class="modalOverlay">
    <div class="modalBox">
        <h2>Create Admin Password</h2>
        <input id="newAdminPassword" type="password" placeholder="Enter password">
        <button id="saveAdminPassword">Save Password</button>
    </div>
</div>

<!-- ADMIN PASSWORD MODAL -->
<div id="adminPasswordModal" class="modalOverlay">
    <div class="modalBox">
        <h2>Enter Admin Password</h2>
        <input id="adminPasswordInput" type="password" placeholder="Password">
        <button id="adminPasswordSubmit">Unlock</button>
    </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="panel">
    <h3 style="margin-top:0;">Admin Mode</h3>
    <button id="closeAdminBtn">X</button>

    <label><b>Grid Spacing</b></label>
    <input id="gridSpacing" type="range" min="40" max="200" value="100">

    <label><b>Icon Corner Radius</b></label>
    <input id="iconRadius" type="range" min="0" max="40" value="14">

    <label><b>Watermark Opacity</b></label>
    <input id="watermarkOpacity" type="range" min="0" max="100" value="6">

    <label><b>Title Size</b></label>
    <input id="titleSize" type="range" min="20" max="60" value="30">

    <hr style="margin:14px 0;">

    <h4>Game Manager</h4>
    <button id="addGameBtn" style="width:100%;padding:6px;margin-bottom:6px;">Add Game</button>
    <div id="gameList" style="max-height:150px;overflow-y:auto;font-size:13px;"></div>

    <h4 id="dangerToggle">▼ Danger Zone</h4>
    <div id="dangerZone" style="display:none;">
        <button id="resetSystem">Reset System</button>
        <button id="resetPassword">Reset Admin Password</button>
    </div>
</div>

<!-- DESKTOP GRID -->
<div id="desktop"></div>

<script>
/* ============================
   DANGER ZONE
============================ */
document.getElementById("dangerToggle").addEventListener("click", () => {
    const dz = document.getElementById("dangerZone");
    dz.style.display = dz.style.display === "none" ? "block" : "none";
});

document.getElementById("resetSystem").addEventListener("click", () => {
    if (!confirm("Reset all settings and games?")) return;
    localStorage.clear();
    location.reload();
});

document.getElementById("resetPassword").addEventListener("click", () => {
    if (!confirm("Reset admin password?")) return;
    localStorage.removeItem("adminPassword");
    location.reload();
});

/* ============================
   SETTINGS PANEL
============================ */
document.getElementById("settingsBtn").addEventListener("click", () => {
    const panel = document.getElementById("settingsPanel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
});

/* ============================
   THEME PRESETS
============================ */
document.getElementById("themePreset").addEventListener("change", (e) => {
    const theme = e.target.value;

    if (theme === "blue") {
        document.body.style.background = "#02030a";
        document.documentElement.style.setProperty("--accent", "#4fd1ff");
    }
    if (theme === "purple") {
        document.body.style.background = "#0b0214";
        document.documentElement.style.setProperty("--accent", "#c26bff");
    }
    if (theme === "red") {
        document.body.style.background = "#140003";
        document.documentElement.style.setProperty("--accent", "#ff4b4b");
    }
    if (theme === "green") {
        document.body.style.background = "#00140a";
        document.documentElement.style.setProperty("--accent", "#00ff9a");
    }
    if (theme === "mono") {
        document.body.style.background = "#000000";
        document.documentElement.style.setProperty("--accent", "#ffffff");
    }
});

/* ============================
   BACKGROUND STYLES
============================ */
document.getElementById("backgroundStyle").addEventListener("change", (e) => {
    const bg = e.target.value;

    if (bg === "dark") {
        document.body.style.background = "#02030a";
    }
    if (bg === "grid") {
        document.body.style.background = `
            repeating-linear-gradient(0deg, #020202 0px, #020202 1px, #000 1px, #000 40px),
            repeating-linear-gradient(90deg, #020202 0px, #020202 1px, #000 1px, #000 40px)
        `;
    }
    if (bg === "gradient") {
        document.body.style.background = "linear-gradient(135deg, #02030a, #111b3a, #02030a)";
    }
    if (bg === "scanlines") {
        document.body.style.background = `
            repeating-linear-gradient(0deg, #000 0px, #000 2px, #020202 2px, #020202 4px)
        `;
    }
});

/* ============================
   LAYOUT MODES
============================ */
document.getElementById("layoutMode").addEventListener("change", (e) => {
    const mode = e.target.value;
    const desktop = document.getElementById("desktop");

    if (mode === "grid") {
        desktop.style.gridTemplateColumns = "repeat(auto-fill, minmax(120px, 1fr))";
        desktop.style.gridAutoRows = "140px";
    }
    if (mode === "compact") {
        desktop.style.gridTemplateColumns = "repeat(auto-fill, minmax(100px, 1fr))";
        desktop.style.gridAutoRows = "120px";
    }
    if (mode === "wide") {
        desktop.style.gridTemplateColumns = "repeat(auto-fill, minmax(180px, 1fr))";
        desktop.style.gridAutoRows = "160px";
    }
});

/* ============================
   ICON SHAPE
============================ */
document.getElementById("iconShape").addEventListener("change", (e) => {
    const shape = e.target.value;

    if (shape === "rounded") currentIconRadius = 14;
    if (shape === "square") currentIconRadius = 0;
    if (shape === "pill") currentIconRadius = 40;

    renderDesktop();
});
/* ============================
   CLICK OUTSIDE TO CLOSE ADMIN
============================ */
document.addEventListener("click", (e) => {
    const panel = document.getElementById("adminPanel");

    if (panel.style.display === "block" && !panel.contains(e.target)) {
        if (
            !e.target.closest(".modalOverlay") &&
            e.target.id !== "settingsBtn" &&
            !document.getElementById("settingsPanel").contains(e.target)
        ) {
            panel.style.display = "none";
        }
    }
});
</script>

</body>
</html>
